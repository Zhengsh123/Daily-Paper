# ==========================================
# Daily arXiv Paper Tracker 配置文件
# ==========================================

# arXiv 分类列表
# 常用分类: cs.AI, cs.CL, cs.CV, cs.LG, cs.RO, stat.ML, eess.SP
# 完整列表: https://arxiv.org/category_taxonomy
arxiv:
  categories:
    - cs.AI
    - cs.CL
    - cs.CV
    - cs.LG
  max_results: 200  # 每个分类最大查询数量

# 关键词筛选配置
filter:
  # 在 title + abstract 中匹配的关键词（不区分大小写，自动扩展同义词）
  # 例: 写 "LLM" 会自动匹配 "large language model" 等变体
  keywords:
    - "large language model"
    - "LLM"
    - "diffusion"
    - "video"
    - "multimodal"
    - "agent"
    - "world"
    - "embodied"
    - "action"
  # 匹配模式: "any" = 匹配任一关键词, "all" = 匹配所有关键词
  mode: "any"

  # 排除分类标签：论文的任一标签命中则排除（检查所有 categories，不只是 primary）
  exclude_categories:
    - "cs.CR"   # 安全
    - "cs.SE"   # 软件工程
    - "cs.SD"   # 音频
    - "eess.AS" # 语音
    - "cs.NI"   # 网络
    - "math.NA" # 数值分析

  # 排除关键词：命中任一则排除该论文（同样支持同义词扩展）
  # 用于过滤不感兴趣的领域
  exclude_keywords:
    # --- LLM 效率/压缩 ---
    - "model compression"
    - "quantization"
    - "pruning"
    - "knowledge distillation"
    - "inference efficiency"
    - "token reduction"
    - "KV cache"
    - "speculative decoding"
    - "model sparsity"
    # --- 医学/生物 ---
    - "medical"
    - "clinical"
    - "healthcare"
    - "diagnosis"
    - "pathology"
    - "radiology"
    - "surgery"
    - "patient"
    - "biomedical"
    - "EHR"
    - "electronic health record"
    # --- 生物/化学/药物 ---
