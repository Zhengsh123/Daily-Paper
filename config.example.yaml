  # 自定义同义词（补充内置同义词表）
  # aliases:
  #   "image editing": ["image manipulation", "photo editing"]

# LLM 摘要配置（通过 OpenAI 兼容协议，支持任意大模型）
llm:
  # API 地址（任何 OpenAI 兼容的 endpoint 都可以）
  # Claude:    https://api.anthropic.com/v1
  # OpenAI:    https://api.openai.com/v1
  # DeepSeek:  https://api.deepseek.com/v1
  # Qwen:      https://dashscope.aliyuncs.com/compatible-mode/v1
  # 本地 Ollama: http://localhost:11434/v1
  base_url: "https://api.anthropic.com"

  # API Key: 直接填写，或通过 api_key_env 指定环境变量名
  api_key: ""
  # api_key_env: "LLM_API_KEY"  # 也可用环境变量，优先级低于 api_key

  # 模型名称（按你的 API 提供商填写）
  model: "claude-sonnet-4-20250514"

  # 每篇论文摘要的最大token数
  max_tokens: 4096
  # 并发请求数（同时调用 LLM API 的线程数）
  concurrency: 5
  # 总结语言
  language: "中文"

# 邮件通知配置
email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender: "your_email@gmail.com"
  # 密码通过环境变量 EMAIL_PASSWORD 设置
  recipients:
    - "recipient@example.com"
  subject_prefix: "[Daily Paper]"

# 输出配置
output:
  dir: "outputs"
  # 报告文件名格式 (strftime)
  filename_format: "%Y-%m-%d.md"
