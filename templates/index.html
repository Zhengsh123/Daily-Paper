<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Paper - {{ date }}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
       background: #f5f5f5; color: #333; padding: 12px; padding-bottom: 80px; }
h1 { font-size: 1.3em; text-align: center; padding: 12px 0; color: #1a5276; }
.meta { text-align: center; font-size: 0.85em; color: #888; margin-bottom: 16px; }

/* 分类折叠 */
.category { margin-bottom: 12px; }
.cat-header { background: #1a5276; color: #fff; padding: 10px 14px; border-radius: 8px 8px 0 0;
              font-size: 1em; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.cat-header .arrow { transition: transform 0.2s; }
.cat-header.collapsed .arrow { transform: rotate(-90deg); }
.cat-body { border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; background: #fff; }
.cat-body.hidden { display: none; }

/* 论文卡片 */
.paper { padding: 12px 14px; border-bottom: 1px solid #eee; display: flex; gap: 10px; }
.paper:last-child { border-bottom: none; }
.paper input[type="checkbox"] { width: 20px; height: 20px; margin-top: 2px; flex-shrink: 0; accent-color: #1a5276; }
.paper-info { flex: 1; min-width: 0; }
.paper-title { font-size: 0.95em; font-weight: 600; color: #2c3e50; line-height: 1.3; word-break: break-word; }
.paper-summary { font-size: 0.82em; color: #666; margin-top: 4px; line-height: 1.4;
                 display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.paper-tags { font-size: 0.75em; color: #999; margin-top: 4px; }
.paper-tags a { color: #2874a6; text-decoration: none; }

/* 底部悬浮按钮 */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
              border-top: 1px solid #ddd; padding: 10px 16px; display: flex; gap: 10px; align-items: center; z-index: 100; }
.bottom-bar .count { font-size: 0.9em; color: #666; white-space: nowrap; }
.bottom-bar button { flex: 1; background: #1a5276; color: #fff; border: none; border-radius: 8px;
                     padding: 12px; font-size: 1em; font-weight: 600; cursor: pointer; }
.bottom-bar button:disabled { background: #aaa; cursor: not-allowed; }
.select-all-bar { text-align: right; padding: 8px 14px; font-size: 0.85em; }
.select-all-bar a { color: #2874a6; cursor: pointer; text-decoration: none; }
</style>
</head>
<body>

<h1>Daily arXiv Paper Report</h1>
<div class="meta">{{ date }} | {{ total }} papers</div>

<form id="deepForm" action="/deep" method="POST">

{% for cat, cat_papers in grouped %}
<div class="category">
  <div class="cat-header" onclick="toggleCat(this)">
    <span>{{ cat }} ({{ cat_papers|length }})</span>
    <span class="arrow">&#9660;</span>
  </div>
  <div class="cat-body">
    <div class="select-all-bar">
      <a onclick="selectAllInCat(this)">Select All</a>
    </div>
    {% for p in cat_papers %}
    <label class="paper">
      <input type="checkbox" name="picks" value="{{ p.index }}" onchange="updateCount()">
      <div class="paper-info">
        <div class="paper-title">{{ p.title }}</div>
        <div class="paper-summary">{{ p.one_line_summary }}</div>
        <div class="paper-tags">
          {{ p.tags }} |
          <a href="{{ p.url }}" target="_blank">abs</a> ·
          <a href="{{ p.pdf_url }}" target="_blank">pdf</a>
        </div>
      </div>
    </label>
    {% endfor %}
  </div>
</div>
{% endfor %}

<div class="bottom-bar">
  <span class="count" id="countLabel">Selected: 0</span>
  <button type="submit" id="submitBtn" disabled>Generate Deep Summary</button>
</div>

</form>

<script>
function updateCount() {
  const n = document.querySelectorAll('input[name="picks"]:checked').length;
  document.getElementById('countLabel').textContent = 'Selected: ' + n;
  document.getElementById('submitBtn').disabled = n === 0;
}
function toggleCat(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('hidden');
}
function selectAllInCat(el) {
  const body = el.closest('.cat-body');
  const boxes = body.querySelectorAll('input[type="checkbox"]');
  const allChecked = Array.from(boxes).every(b => b.checked);
  boxes.forEach(b => b.checked = !allChecked);
  el.textContent = allChecked ? 'Select All' : 'Deselect All';
  updateCount();
}
</script>

</body>
</html>
